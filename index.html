<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pedidos</title>
<style>
  :root {
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --surface-2: #F1ECE4;
    --border: #E5DFD4;
    --text: #2B2520;
    --text-2: #7A7064;
    --text-3: #ACA292;
    --accent: #B5512E;
    --accent-light: #F2E3DA;
    --success: #4A7A53;
    --success-light: #E5EFE3;
    --warning: #B5832E;
    --warning-light: #F5EAD7;
    --danger: #B5402E;
    --danger-light: #F5E0DA;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 90px;
  }
  h1, h2, h3, p { margin: 0; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input, textarea, select {
    font-family: inherit; font-size: 16px; width: 100%;
    padding: 11px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }

  /* HEADER */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: var(--bg); padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
  }
  .topbar-row { display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.3px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; }
  .sync-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--danger); }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .sync-label { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 5px; }
  .tabs { display: flex; gap: 6px; margin-top: 14px; overflow-x: auto; }
  .tab { padding: 7px 14px; border-radius: 100px; font-size: 13.5px; font-weight: 500; color: var(--text-2); background: var(--surface-2); white-space: nowrap; }
  .tab.active { background: var(--text); color: var(--surface); }

  .page { padding: 16px; max-width: 480px; margin: 0 auto; }
  .hidden { display: none !important; }

  /* CARDS INICIO */
  .order-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
  }
  .order-card-main { display: flex; gap: 12px; padding: 12px 12px 10px; cursor: pointer; }
  .thumb {
    width: 58px; height: 58px; border-radius: var(--radius-sm);
    background: var(--surface-2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb .ph { color: var(--text-3); font-size: 22px; }
  .thumb-stack {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.6); color: white;
    font-size: 9.5px; font-weight: 600; padding: 1px 5px; border-radius: 100px;
  }
  .order-info { flex: 1; min-width: 0; }
  .order-client { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .order-meta { font-size: 12.5px; color: var(--text-2); margin-bottom: 6px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 100px; display: inline-flex; align-items: center; gap: 3px; }
  .badge.warn { background: var(--warning-light); color: var(--warning); }
  .badge.ok { background: var(--success-light); color: var(--success); }
  .badge.neutral { background: var(--surface-2); color: var(--text-2); }
  .badge.danger { background: var(--danger-light); color: var(--danger); }

  /* Pie de card con deuda + acciones */
  .order-card-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 12px 10px; border-top: 1px solid var(--border);
  }
  .debt-label { font-size: 12px; color: var(--text-2); }
  .debt-amount { font-size: 16px; font-weight: 600; }
  .debt-amount.zero { color: var(--success); }
  .debt-amount.owed { color: var(--danger); }
  .card-delete-btn {
    background: var(--danger-light); color: var(--danger);
    border: none; border-radius: var(--radius-sm);
    padding: 5px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .card-delete-btn:active { opacity: 0.7; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-3); }
  .empty-state .ic { font-size: 34px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--surface);
    border-radius: 100px; padding: 14px 26px;
    font-size: 15px; font-weight: 600;
    display: flex; align-items: center; gap: 7px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.18); z-index: 30;
  }
  .fab:active { transform: translateX(-50%) scale(0.96); }

  /* FORM */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; }
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .pair-block { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 12px; }
  .pair-block:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }
  .pair-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .pair-head span { font-size: 12.5px; font-weight: 600; color: var(--text-2); }
  .pair-remove { font-size: 12px; color: var(--danger); font-weight: 500; cursor: pointer; }
  .pair-row { display: flex; gap: 10px; }
  .photo-input {
    width: 64px; height: 64px; border-radius: var(--radius-sm);
    border: 1.5px dashed var(--text-3); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); font-size: 22px;
    position: relative; overflow: hidden; background: var(--surface-2); cursor: pointer;
  }
  .photo-input img { width: 100%; height: 100%; object-fit: cover; }
  .photo-input input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; padding: 0; width: 100%; }
  .pair-fields { flex: 1; display: flex; flex-direction: column; gap: 7px; }

  .btn {
    width: 100%; padding: 11px; border-radius: var(--radius-sm);
    font-size: 14.5px; font-weight: 600;
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:active { transform: scale(0.98); }
  .btn.primary { background: var(--text); color: var(--surface); border: none; }
  .btn.success { background: var(--success); color: white; border: none; }
  .btn.danger-outline { color: var(--danger); border-color: var(--danger-light); }
  .btn.small { padding: 8px; font-size: 13px; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn-row .btn { flex: 1; }

  /* DETALLE TIPO FACTURA */
  .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .back-btn { font-size: 20px; color: var(--text); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .detail-header h2 { font-size: 18px; font-weight: 600; flex: 1; }
  .edit-toggle { color: var(--text-2); font-size: 18px; }

  .notes-box {
    background: var(--warning-light); border-radius: var(--radius-sm);
    padding: 9px 11px; margin-bottom: 14px; font-size: 13px; color: var(--warning);
    display: flex; gap: 8px; align-items: flex-start;
  }

  /* FACTURA */
  .factura { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
  .factura-header { background: var(--text); color: var(--surface); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .factura-header-title { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.7; }
  .factura-header-val { font-size: 14px; font-weight: 700; }
  .factura-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .factura-row:last-child { border-bottom: none; }
  .factura-lbl { color: var(--text-2); }
  .factura-val { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }

  /* Bloque par dentro de factura */
  .par-bloque { border-bottom: 1px solid var(--border); }
  .par-bloque:last-child { border-bottom: none; }
  .par-bloque-header { background: var(--surface-2); padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
  .par-bloque-num { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; }
  .par-bloque-talle { font-size: 14px; font-weight: 600; flex: 1; }
  .par-bloque-foto { width: 100%; max-height: 200px; object-fit: cover; display: block; cursor: pointer; }
  .par-bloque-rows {}

  /* Cobro */
  .cobro-resumen { background: var(--surface-2); padding: 12px 16px; }
  .cobro-line { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 5px; }
  .cobro-line:last-child { margin-bottom: 0; }
  .cobro-saldo { font-size: 17px; font-weight: 700; }
  .saldo-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 10px; }
  .saldo-fill { height: 100%; background: var(--success); border-radius: 3px; }
  .pagos-lista { padding: 0 16px; }
  .pago-line { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .pago-line:last-child { border-bottom: none; }
  .pago-line .pdebt { font-size: 12px; font-weight: 500; }
  .pago-line .pdebt.owed { color: var(--danger); }
  .pago-line .pdebt.clear { color: var(--success); }

  /* Entrega */
  .delivery-row { display: flex; align-items: center; justify-content: space-between; background: var(--success-light); border-radius: var(--radius-sm); padding: 11px 13px; margin-bottom: 12px; }
  .delivery-row.pending { background: var(--surface-2); }
  .delivery-row .lbl { font-size: 13.5px; font-weight: 500; display: flex; align-items: center; gap: 6px; color: var(--success); }
  .delivery-row.pending .lbl { color: var(--text-2); }
  .delivery-row button { background: var(--surface); border: 1px solid var(--border); padding: 7px 12px; border-radius: var(--radius-sm); font-size: 12.5px; font-weight: 600; }

  /* HISTORIAL */
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
  .history-thumb { width: 46px; height: 46px; border-radius: var(--radius-sm); background: var(--surface-2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; color: var(--text-3); }
  .history-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .history-info { flex: 1; min-width: 0; }
  .history-info .nm { font-size: 13.5px; font-weight: 600; }
  .history-info .det { font-size: 11.5px; color: var(--text-2); }
  .history-profit { text-align: right; }
  .history-profit .lbl { font-size: 9.5px; color: var(--text-2); }
  .history-profit .val { font-size: 13.5px; font-weight: 600; color: var(--success); }

  /* RESUMEN */
  .summary-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .summary-line { display: flex; justify-content: space-between; align-items: center; padding: 13px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .summary-line:last-child { border-bottom: none; }
  .summary-line .nm { font-size: 14.5px; font-weight: 500; }
  .summary-line .amt { font-size: 14.5px; font-weight: 600; color: var(--danger); }
  .summary-total { text-align: center; padding: 14px 0 18px; color: var(--text-2); font-size: 13px; }
  .summary-total .amt { font-size: 24px; font-weight: 700; color: var(--text); display: block; margin-top: 2px; }

  /* LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(20,16,12,0.94); z-index: 100; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .lightbox img { max-width: 92%; max-height: 70vh; border-radius: 8px; object-fit: contain; }
  .lightbox .ph-big { color: rgba(255,255,255,0.3); font-size: 80px; }
  .lightbox-close { position: absolute; top: 18px; right: 18px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.12); color: white; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .lightbox-caption { margin-top: 16px; color: white; font-size: 14px; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 100px; }

  /* BOTTOM SHEET */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(20,16,12,0.45); z-index: 90; display: flex; align-items: flex-end; }
  .sheet { background: var(--bg); width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 26px; max-width: 480px; margin: 0 auto; }
  .sheet h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }

  .section-title { font-size: 12.5px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 100px; font-size: 13.5px; font-weight: 500; z-index: 200; box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
  .loader-wrap { display: flex; justify-content: center; padding: 40px 0; }
  .spinner { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid var(--border); border-top-color: var(--accent); animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <h1>Pedidos</h1>
    <span class="sync-label"><span class="sync-dot" id="syncDot"></span><span id="syncText">Listo</span></span>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="inicio">Inicio</button>
    <button class="tab" data-tab="historial">Historial</button>
    <button class="tab" data-tab="resumen">Resumen</button>
  </div>
</div>

<div class="page" id="page-inicio"></div>
<div class="page hidden" id="page-nuevo"></div>
<div class="page hidden" id="page-detalle"></div>
<div class="page hidden" id="page-historial"></div>
<div class="page hidden" id="page-resumen"></div>

<button class="fab" id="fabNuevo"><span>+</span> Nuevo pedido</button>
<div id="modalRoot"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjby6k5Jwur6GYnmsAtHvIDeQ4diVAlNXPRb94vyu5NYcwlMSog94mTJJSFVE8tVfUEA/exec";

let state = {
  pedidos: [], pares: [], pagos: [],
  currentTab: 'inicio', currentOrderId: null, editingOrderId: null,
  newPairs: [{ talle: '', precio_venta: '', foto_url: '', foto_preview: '', _file: null }]
};

// ============ UTILIDADES ============

function fmt(n) {
  n = Math.round(Number(n) || 0);
  return '$' + n.toLocaleString('es-CO');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function showToast(msg) {
  const root = document.getElementById('modalRoot');
  const old = root.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  root.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

function setSync(status, text) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncText');
  dot.className = 'sync-dot' + (status !== 'ok' ? ' ' + status : '');
  lbl.textContent = text;
}

async function apiGet() {
  setSync('loading', 'Sincronizando...');
  try {
    const res = await fetch(API_URL + '?action=getAll', { method: 'GET', redirect: 'follow' });
    const data = JSON.parse(await res.text());
    if (data.error) throw new Error(data.error);
    state.pedidos = data.pedidos || [];
    state.pares = data.pares || [];
    state.pagos = data.pagos || [];
    setSync('ok', 'Listo');
    return true;
  } catch (err) {
    setSync('error', 'Sin conexión');
    console.error(err);
    return false;
  }
}

async function apiPost(body) {
  setSync('loading', 'Guardando...');
  try {
    const res = await fetch(API_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    const data = JSON.parse(await res.text());
    if (data.error) throw new Error(data.error);
    setSync('ok', 'Listo');
    return data;
  } catch (err) {
    setSync('error', 'Error al guardar');
    showToast('No se pudo guardar. Probá de nuevo.');
    console.error(err);
    return null;
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(file) {
  const base64 = await fileToBase64(file);
  const data = await apiPost({ action: 'subirFoto', base64, mimeType: file.type, nombre: 'zapatilla_' + Date.now() + '.jpg' });
  return data ? data.url : null;
}

// ============ HELPERS NEGOCIO ============

function getPairsForOrder(orderId) { return state.pares.filter(p => p.id_pedido === orderId); }
function getPaymentsForOrder(orderId) { return state.pagos.filter(p => p.id_pedido === orderId).sort((a,b) => new Date(a.fecha) - new Date(b.fecha)); }
function getOrderTotal(orderId) { return getPairsForOrder(orderId).reduce((sum, p) => sum + (Number(p.precio_venta) || 0), 0); }
function getOrderPaid(orderId) { const p = state.pedidos.find(p => p.id_pedido === orderId); return p ? (Number(p.total_pagado) || 0) : 0; }
function getOrderDebt(orderId) { return Math.max(0, getOrderTotal(orderId) - getOrderPaid(orderId)); }
function getPurchaseStatus(orderId) {
  const pares = getPairsForOrder(orderId).filter(p => p.estado_compra !== 'cancelado');
  if (pares.length === 0) return 'pendiente';
  return pares.every(p => p.estado_compra === 'comprado') ? 'comprado' : 'pendiente';
}
function isOrderComplete(orderId) {
  const pedido = state.pedidos.find(p => p.id_pedido === orderId);
  if (!pedido) return false;
  return getPurchaseStatus(orderId) === 'comprado' && pedido.estado_entrega === 'entregado' && getOrderDebt(orderId) <= 0;
}
function firstPhoto(orderId) {
  const p = getPairsForOrder(orderId).find(p => p.foto_url);
  return p ? p.foto_url : null;
}

// ============ RENDER INICIO ============

function renderInicio() {
  const el = document.getElementById('page-inicio');
  const activos = state.pedidos.filter(p => !isOrderComplete(p.id_pedido));

  if (activos.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ic">&#128094;</div><p>No hay pedidos activos todavía.<br>Tocá "Nuevo pedido" para crear el primero.</p></div>`;
    return;
  }

  activos.sort((a, b) => new Date(b.fecha_creacion) - new Date(a.fecha_creacion));

  el.innerHTML = activos.map(pedido => {
    const pares = getPairsForOrder(pedido.id_pedido).filter(p => p.estado_compra !== 'cancelado');
    const compraStatus = getPurchaseStatus(pedido.id_pedido);
    const entregado = pedido.estado_entrega === 'entregado';
    const debt = getOrderDebt(pedido.id_pedido);
    const photo = firstPhoto(pedido.id_pedido);
    const talles = pares.map(p => p.talle).join(', ');

    let badges = '';
    badges += compraStatus === 'comprado' ? `<span class="badge ok">&#10003; Comprado</span>` : `<span class="badge warn">Por comprar</span>`;
    if (entregado) badges += `<span class="badge ok">&#10003; Entregado</span>`;

    return `
      <div class="order-card" data-order="${pedido.id_pedido}">
        <div class="order-card-main" data-open-order="${pedido.id_pedido}">
          <div class="thumb">
            ${photo ? `<img src="${photo}">` : `<span class="ph">&#128094;</span>`}
            ${pares.length > 1 ? `<div class="thumb-stack">${pares.length}</div>` : ''}
          </div>
          <div class="order-info">
            <div class="order-client">${escapeHtml(pedido.cliente)}</div>
            <div class="order-meta">${pares.length} ${pares.length === 1 ? 'par' : 'pares'}${talles ? ' · T' + talles : ''}</div>
            <div class="badges">${badges}</div>
          </div>
        </div>
        <div class="order-card-bottom">
          <div>
            <span class="debt-label">Debe</span><br>
            <span class="debt-amount ${debt <= 0 ? 'zero' : 'owed'}">${debt <= 0 ? 'Pagado' : fmt(debt)}</span>
          </div>
          <button class="card-delete-btn" data-delete-order="${pedido.id_pedido}">🗑 Eliminar</button>
        </div>
      </div>`;
  }).join('');
}

// ============ RENDER NUEVO PEDIDO ============
// FIX: usamos contador global para IDs únicos y no dependemos del índice del array

let pairCounter = 0;

function resetNewPairs() {
  pairCounter = 0;
  state.newPairs = [{ uid: pairCounter++, talle: '', precio_venta: '', foto_url: '', foto_preview: '', _file: null }];
}

function renderNuevoPedido() {
  const el = document.getElementById('page-nuevo');
  const editing = state.editingOrderId;
  const pedidoExistente = editing ? state.pedidos.find(p => p.id_pedido === editing) : null;

  el.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" id="nuevoBack">&#8592;</button>
      <h2>${editing ? 'Editar pedido' : 'Nuevo pedido'}</h2>
    </div>
    <div class="section-card">
      <div class="field">
        <label>Cliente</label>
        <input type="text" id="inputCliente" placeholder="Nombre del cliente" value="${pedidoExistente ? escapeHtml(pedidoExistente.cliente) : ''}">
      </div>
      <div id="pairsContainer"></div>
      <button class="btn small" id="addPairBtn" style="margin-top:10px;">+ Agregar otro par</button>
      <div class="field" style="margin-top:14px;">
        <label>Notas adicionales (opcional)</label>
        <textarea id="inputNotas" rows="2" placeholder="Ej: si no hay el T42, llevar el T41">${pedidoExistente ? escapeHtml(pedidoExistente.notas || '') : ''}</textarea>
      </div>
      <button class="btn success" id="saveOrderBtn" style="margin-top:6px;">${editing ? 'Guardar cambios' : 'Crear pedido'}</button>
    </div>`;

  renderPairsForm();
  document.getElementById('nuevoBack').onclick = () => goToTab('inicio');
  document.getElementById('addPairBtn').onclick = () => {
    state.newPairs.push({ uid: pairCounter++, talle: '', precio_venta: '', foto_url: '', foto_preview: '', _file: null });
    renderPairsForm();
  };
  document.getElementById('saveOrderBtn').onclick = saveOrder;
}

function renderPairsForm() {
  const container = document.getElementById('pairsContainer');
  if (!container) return;

  container.innerHTML = state.newPairs.map((pair, i) => {
    const uid = pair.uid;
    return `
      <div class="pair-block" id="pair-block-${uid}">
        <div class="pair-head">
          <span>Par ${i + 1}</span>
          ${state.newPairs.length > 1 ? `<span class="pair-remove" data-remove-uid="${uid}">Quitar</span>` : ''}
        </div>
        <div class="pair-row">
          <div class="photo-input" id="photo-box-${uid}">
            ${pair.foto_preview ? `<img src="${pair.foto_preview}" id="photo-img-${uid}">` : `<span id="photo-ph-${uid}">&#128247;</span>`}
            <input type="file" accept="image/*" id="file-input-${uid}">
          </div>
          <div class="pair-fields">
            <input type="text" placeholder="Talle" value="${escapeHtml(pair.talle)}" id="talle-${uid}">
            <input type="number" placeholder="Precio de venta" value="${pair.precio_venta || ''}" id="venta-${uid}">
          </div>
        </div>
      </div>`;
  }).join('');

  // Eventos quitar
  container.querySelectorAll('[data-remove-uid]').forEach(btn => {
    btn.addEventListener('click', () => {
      const uid = Number(btn.dataset.removeUid);
      state.newPairs = state.newPairs.filter(p => p.uid !== uid);
      renderPairsForm();
    });
  });

  // Eventos foto
  state.newPairs.forEach(pair => {
    const fileInput = document.getElementById(`file-input-${pair.uid}`);
    if (!fileInput) return;
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const localUrl = URL.createObjectURL(file);
      pair.foto_preview = localUrl;
      pair._file = file;
      // Actualizar preview sin re-renderizar todo
      const box = document.getElementById(`photo-box-${pair.uid}`);
      if (box) {
        const ph = document.getElementById(`photo-ph-${pair.uid}`);
        if (ph) ph.remove();
        let img = document.getElementById(`photo-img-${pair.uid}`);
        if (!img) { img = document.createElement('img'); img.id = `photo-img-${pair.uid}`; box.insertBefore(img, fileInput); }
        img.src = localUrl;
      }
    });
  });

  // Eventos texto — guardar al cambiar foco o escribir
  state.newPairs.forEach(pair => {
    const talleInput = document.getElementById(`talle-${pair.uid}`);
    const ventaInput = document.getElementById(`venta-${pair.uid}`);
    if (talleInput) talleInput.addEventListener('input', e => { pair.talle = e.target.value; });
    if (ventaInput) ventaInput.addEventListener('input', e => { pair.precio_venta = e.target.value; });
  });
}

async function saveOrder() {
  // Leer valores actuales de los inputs antes de guardar
  state.newPairs.forEach(pair => {
    const t = document.getElementById(`talle-${pair.uid}`);
    const v = document.getElementById(`venta-${pair.uid}`);
    if (t) pair.talle = t.value;
    if (v) pair.precio_venta = v.value;
  });

  const cliente = document.getElementById('inputCliente').value.trim();
  const notas = document.getElementById('inputNotas').value.trim();
  if (!cliente) { showToast('Falta el nombre del cliente'); return; }
  const validPairs = state.newPairs.filter(p => p.talle.trim() !== '');
  if (validPairs.length === 0) { showToast('Agregá al menos un par con talle'); return; }

  const btn = document.getElementById('saveOrderBtn');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  for (const pair of validPairs) {
    if (pair._file && !pair.foto_url) {
      const url = await uploadPhoto(pair._file);
      if (url) pair.foto_url = url;
    }
  }

  if (state.editingOrderId) {
    await apiPost({ action: 'editarPedido', id_pedido: state.editingOrderId, cliente, notas });
    showToast('Pedido actualizado');
  } else {
    await apiPost({
      action: 'crearPedido', cliente, notas,
      pares: validPairs.map(p => ({ talle: p.talle, precio_venta: Number(p.precio_venta) || 0, foto_url: p.foto_url || '', es_alternativa: false }))
    });
    showToast('Pedido creado');
  }

  resetNewPairs();
  state.editingOrderId = null;
  await refreshData();
  goToTab('inicio');
}

// ============ DETALLE TIPO FACTURA ============

function renderDetalle(orderId) {
  const el = document.getElementById('page-detalle');
  const pedido = state.pedidos.find(p => p.id_pedido === orderId);
  if (!pedido) { goToTab('inicio'); return; }

  const pares = getPairsForOrder(orderId);
  const pagos = getPaymentsForOrder(orderId);
  const total = getOrderTotal(orderId);
  const paid = getOrderPaid(orderId);
  const debt = getOrderDebt(orderId);
  const entregado = pedido.estado_entrega === 'entregado';
  const canEdit = !isOrderComplete(orderId);
  const pct = total > 0 ? Math.round((paid / total) * 100) : 0;

  // Pagos con saldo corrido
  let runningPaid = 0;
  const pagosHtml = pagos.map((pago, i) => {
    runningPaid += Number(pago.monto);
    const remaining = Math.max(0, total - runningPaid);
    return `
      <div class="pago-line">
        <div>
          <div style="font-weight:500;">Pago ${i+1}</div>
          <div style="font-size:12px;color:var(--text-2);">${fmt(pago.monto)}</div>
        </div>
        <span class="pdebt ${remaining <= 0 ? 'clear' : 'owed'}">Queda ${fmt(remaining)}</span>
      </div>`;
  }).join('');

  let html = `
    <div class="detail-header">
      <button class="back-btn" id="detalleBack">&#8592;</button>
      <h2>${escapeHtml(pedido.cliente)}</h2>
      ${canEdit ? `<button class="edit-toggle" id="editOrderBtn">&#9998;</button>` : ''}
    </div>
    ${pedido.notas ? `<div class="notes-box"><span>&#128221;</span><span>${escapeHtml(pedido.notas)}</span></div>` : ''}

    <!-- BLOQUE PEDIDO -->
    <div class="factura">
      <div class="factura-header">
        <span class="factura-header-title">Pedido</span>
        <span class="factura-header-val">${escapeHtml(pedido.cliente)}</span>
      </div>
      <div class="factura-row"><span class="factura-lbl">Pares</span><span class="factura-val">${pares.length} ${pares.length===1?'par':'pares'}</span></div>
      <div class="factura-row"><span class="factura-lbl">Estado</span><span class="factura-val">${entregado ? '✅ Entregado' : '🕐 En proceso'}</span></div>
      <div class="factura-row"><span class="factura-lbl">Total venta</span><span class="factura-val" style="font-weight:700;">${fmt(total)}</span></div>
    </div>

    <!-- BLOQUE PARES -->
    <div class="factura">
      <div class="factura-header">
        <span class="factura-header-title">Zapatillas</span>
        <span class="factura-header-val">${pares.length} ${pares.length===1?'par':'pares'}</span>
      </div>
      ${pares.map((par, i) => {
        const isComprado = par.estado_compra === 'comprado';
        const isCancelado = par.estado_compra === 'cancelado';
        const costo = Number(par.costo_compra) || 0;
        const venta = Number(par.precio_venta) || 0;
        const ganancia = venta - costo;
        return `
          <div class="par-bloque" style="${isCancelado ? 'opacity:0.5;' : ''}">
            <div class="par-bloque-header">
              <span class="par-bloque-num">Par ${i+1}</span>
              <span class="par-bloque-talle">Talle ${escapeHtml(par.talle)}</span>
              ${isCancelado ? `<span class="badge neutral">Cancelado</span>` : isComprado ? `<span class="badge ok">✓ Comprado</span>` : `<span class="badge warn">Por comprar</span>`}
            </div>
            ${par.foto_url ? `<img src="${par.foto_url}" class="par-bloque-foto" data-photo-click="${par.id_par}">` : ''}
            <div class="par-bloque-rows">
              <div class="factura-row"><span class="factura-lbl">Precio venta</span><span class="factura-val">${fmt(venta)}</span></div>
              ${isComprado ? `
                <div class="factura-row"><span class="factura-lbl">Centro comercial</span><span class="factura-val">${escapeHtml(par.tienda||'—')}</span></div>
                <div class="factura-row"><span class="factura-lbl">Local</span><span class="factura-val">${escapeHtml(par.local||'—')}</span></div>
                <div class="factura-row"><span class="factura-lbl">Costo compra</span><span class="factura-val">${fmt(costo)}</span></div>
                <div class="factura-row" style="background:var(--success-light);"><span class="factura-lbl" style="color:var(--success);">Ganancia</span><span class="factura-val" style="color:var(--success);font-weight:700;">${fmt(ganancia)}</span></div>
              ` : !isCancelado && canEdit ? `
                <div class="factura-row" style="justify-content:center;padding:12px 16px;">
                  <div style="display:flex;gap:8px;width:100%;">
                    <button class="btn small" style="flex:1;" data-mark-comprado="${par.id_par}">Registrar compra</button>
                    <button class="btn small danger-outline" style="flex:0 0 auto;" data-cancel-pair="${par.id_par}">Cancelar</button>
                  </div>
                </div>` : ''}
            </div>
          </div>`;
      }).join('')}
    </div>

    <!-- ENTREGA -->
    <div class="delivery-row ${entregado ? '' : 'pending'}">
      <span class="lbl">&#128666; ${entregado ? 'Entregado' : 'Entrega pendiente'}</span>
      ${!entregado ? `<button data-mark-delivered="${orderId}">Marcar entregado</button>` : ''}
    </div>

    <!-- BLOQUE COBRO -->
    <div class="factura">
      <div class="factura-header">
        <span class="factura-header-title">Cobro</span>
        <span class="factura-header-val" style="${debt>0?'color:#FFCDD2':'color:#C8E6C9'}">${debt>0?'Pendiente':'✓ Saldado'}</span>
      </div>
      <div class="cobro-resumen">
        <div class="cobro-line"><span style="color:var(--text-2)">Total</span><span style="font-weight:600">${fmt(total)}</span></div>
        <div class="cobro-line"><span style="color:var(--text-2)">Cobrado</span><span style="color:var(--success);font-weight:600">${fmt(paid)}</span></div>
        <div class="cobro-line" style="margin-top:4px;"><span style="font-weight:700">Saldo pendiente</span><span class="cobro-saldo" style="color:${debt>0?'var(--danger)':'var(--success)'};">${fmt(debt)}</span></div>
        <div class="saldo-track"><div class="saldo-fill" style="width:${pct}%"></div></div>
        <div style="text-align:right;font-size:11px;color:var(--text-3);margin-top:4px;">${pct}% cobrado</div>
      </div>
      ${pagosHtml ? `<div class="pagos-lista"><div style="font-size:11px;font-weight:700;color:var(--text-3);padding:10px 0 4px;text-transform:uppercase;letter-spacing:0.06em;">Pagos recibidos</div>${pagosHtml}</div>` : ''}
      ${debt > 0 ? `<div style="padding:12px 16px;"><button class="btn primary" data-register-payment="${orderId}">+ Registrar pago</button></div>` : `<div style="text-align:center;padding:10px;color:var(--success);font-size:13px;font-weight:500;">✓ Pagado completo</div>`}
    </div>

    <!-- ELIMINAR -->
    <div style="margin-top:4px;margin-bottom:16px;">
      <button class="btn danger-outline" data-delete-order="${orderId}">🗑 Eliminar pedido</button>
    </div>`;

  el.innerHTML = html;

  document.getElementById('detalleBack').onclick = () => goToTab('inicio');
  const editBtn = document.getElementById('editOrderBtn');
  if (editBtn) editBtn.onclick = () => openEditOrder(orderId);

  el.querySelectorAll('[data-mark-comprado]').forEach(btn => btn.onclick = () => openPurchaseForm(btn.dataset.markComprado));
  el.querySelectorAll('[data-cancel-pair]').forEach(btn => btn.onclick = () => cancelPair(btn.dataset.cancelPair, orderId));
  el.querySelectorAll('[data-mark-delivered]').forEach(btn => btn.onclick = () => markDelivered(btn.dataset.markDelivered));
  el.querySelectorAll('[data-register-payment]').forEach(btn => btn.onclick = () => openPaymentSheet(btn.dataset.registerPayment, debt));
  el.querySelectorAll('[data-photo-click]').forEach(img => img.onclick = () => {
    const par = pares.find(p => p.id_par === img.dataset.photoClick);
    if (par?.foto_url) openLightbox(par.foto_url, 'Talle ' + par.talle);
  });
  el.querySelectorAll('[data-delete-order]').forEach(btn => btn.onclick = () => deleteOrder(btn.dataset.deleteOrder));
}

// ============ ACCIONES ============

function openPurchaseForm(parId) {
  const par = state.pares.find(p => p.id_par === parId);
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="sheet-overlay" id="purchaseOverlay">
      <div class="sheet">
        <h3>Registrar compra · Talle ${escapeHtml(par.talle)}</h3>
        <div class="field"><label>Centro comercial</label><input type="text" id="pTienda" placeholder="Ej: Unicentro"></div>
        <div class="field"><label>Local</label><input type="text" id="pLocal" placeholder="Ej: Nike, local 214"></div>
        <div class="field"><label>Costo de compra</label><input type="number" id="pCosto" placeholder="0"></div>
        <button class="btn success" id="confirmPurchase">Confirmar compra</button>
      </div>
    </div>`;
  document.getElementById('purchaseOverlay').onclick = (e) => { if (e.target.id === 'purchaseOverlay') root.innerHTML = ''; };
  document.getElementById('confirmPurchase').onclick = async () => {
    const tienda = document.getElementById('pTienda').value.trim();
    const local = document.getElementById('pLocal').value.trim();
    const costo = document.getElementById('pCosto').value;
    if (!tienda || !costo) { showToast('Completá centro comercial y costo'); return; }
    await apiPost({ action: 'actualizarPar', id_par: parId, tienda, local, costo_compra: Number(costo), estado_compra: 'comprado' });
    root.innerHTML = '';
    await refreshData();
    renderDetalle(par.id_pedido);
    showToast('Compra registrada');
  };
}

async function cancelPair(parId, orderId) {
  if (!confirm('¿Cancelar este par?')) return;
  await apiPost({ action: 'actualizarPar', id_par: parId, estado_compra: 'cancelado' });
  await refreshData();
  renderDetalle(orderId);
  showToast('Par cancelado');
}

async function markDelivered(orderId) {
  await apiPost({ action: 'marcarEntregado', id_pedido: orderId });
  await refreshData();
  renderDetalle(orderId);
  showToast('Marcado como entregado');
}

function openPaymentSheet(orderId, debt) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="sheet-overlay" id="paymentOverlay">
      <div class="sheet">
        <h3>Registrar pago</h3>
        <div class="field">
          <label>Monto recibido (debe ${fmt(debt)})</label>
          <input type="number" id="pagoMonto" placeholder="0">
        </div>
        <button class="btn primary" id="confirmPayment">Registrar</button>
      </div>
    </div>`;
  document.getElementById('paymentOverlay').onclick = (e) => { if (e.target.id === 'paymentOverlay') root.innerHTML = ''; };
  document.getElementById('confirmPayment').onclick = async () => {
    const monto = Number(document.getElementById('pagoMonto').value);
    if (!monto || monto <= 0) { showToast('Ingresá un monto válido'); return; }
    await apiPost({ action: 'registrarPago', id_pedido: orderId, monto });
    root.innerHTML = '';
    await refreshData();
    if (isOrderComplete(orderId)) { showToast('Pedido completado'); goToTab('inicio'); }
    else { renderDetalle(orderId); showToast('Pago registrado'); }
  };
}

async function deleteOrder(orderId) {
  if (!confirm('¿Eliminar este pedido? Esta acción no se puede deshacer.')) return;
  await apiPost({ action: 'eliminarPedido', id_pedido: orderId });
  await refreshData();
  showToast('Pedido eliminado');
  goToTab('inicio');
}

function openEditOrder(orderId) {
  const pares = getPairsForOrder(orderId);
  state.editingOrderId = orderId;
  pairCounter = 0;
  state.newPairs = pares.map(p => ({ uid: pairCounter++, talle: p.talle, precio_venta: p.precio_venta, foto_url: p.foto_url, foto_preview: p.foto_url, _file: null, id_par: p.id_par }));
  goToTab('nuevo');
}

function openLightbox(url, caption) {
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="lightbox" id="lightboxEl">
      <button class="lightbox-close" id="lightboxClose">&#10005;</button>
      ${url ? `<img src="${url}">` : `<span class="ph-big">&#128094;</span>`}
      ${caption ? `<div class="lightbox-caption">${escapeHtml(caption)}</div>` : ''}
    </div>`;
  document.getElementById('lightboxClose').onclick = () => root.innerHTML = '';
  document.getElementById('lightboxEl').onclick = (e) => { if (e.target.id === 'lightboxEl') root.innerHTML = ''; };
}

// ============ HISTORIAL ============

function renderHistorial() {
  const el = document.getElementById('page-historial');
  const completos = state.pedidos.filter(p => isOrderComplete(p.id_pedido));
  if (completos.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ic">&#128203;</div><p>Todavía no hay pedidos completados.</p></div>`;
    return;
  }
  completos.sort((a, b) => new Date(b.fecha_creacion) - new Date(a.fecha_creacion));
  el.innerHTML = completos.map(pedido => {
    const pares = getPairsForOrder(pedido.id_pedido).filter(p => p.estado_compra !== 'cancelado');
    const photo = firstPhoto(pedido.id_pedido);
    const talles = pares.map(p => p.talle).join(', ');
    const ganancia = pares.reduce((sum, p) => sum + ((Number(p.precio_venta)||0) - (Number(p.costo_compra)||0)), 0);
    return `
      <div class="history-card" onclick="state.currentOrderId='${pedido.id_pedido}';goToTab('detalle');">
        <div class="history-thumb">${photo ? `<img src="${photo}">` : '&#128094;'}</div>
        <div class="history-info">
          <div class="nm">${escapeHtml(pedido.cliente)}</div>
          <div class="det">T${talles} · ${pares.length} ${pares.length===1?'par':'pares'}</div>
        </div>
        <div class="history-profit">
          <div class="lbl">Ganancia</div>
          <div class="val">${fmt(ganancia)}</div>
        </div>
      </div>`;
  }).join('');
}

// ============ RESUMEN ============

function renderResumen() {
  const el = document.getElementById('page-resumen');
  const activos = state.pedidos.filter(p => !isOrderComplete(p.id_pedido) && getOrderDebt(p.id_pedido) > 0);
  if (activos.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ic">&#128181;</div><p>Nadie debe plata por ahora.</p></div>`;
    return;
  }
  activos.sort((a, b) => getOrderDebt(b.id_pedido) - getOrderDebt(a.id_pedido));
  const totalDebt = activos.reduce((sum, p) => sum + getOrderDebt(p.id_pedido), 0);
  el.innerHTML = `
    <div class="section-title">Quién debe</div>
    <div class="summary-row">
      ${activos.map(p => `
        <div class="summary-line" onclick="state.currentOrderId='${p.id_pedido}';goToTab('detalle');">
          <span class="nm">${escapeHtml(p.cliente)}</span>
          <span class="amt">${fmt(getOrderDebt(p.id_pedido))}</span>
        </div>`).join('')}
    </div>
    <div class="summary-total">Total por cobrar<span class="amt">${fmt(totalDebt)}</span></div>`;
}

// ============ NAVEGACIÓN ============

function goToTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const fab = document.getElementById('fabNuevo');

  if (tab === 'inicio') {
    document.getElementById('page-inicio').classList.remove('hidden');
    document.querySelector('.tab[data-tab="inicio"]').classList.add('active');
    fab.classList.remove('hidden');
    renderInicio();
  } else if (tab === 'historial') {
    document.getElementById('page-historial').classList.remove('hidden');
    document.querySelector('.tab[data-tab="historial"]').classList.add('active');
    fab.classList.add('hidden');
    renderHistorial();
  } else if (tab === 'resumen') {
    document.getElementById('page-resumen').classList.remove('hidden');
    document.querySelector('.tab[data-tab="resumen"]').classList.add('active');
    fab.classList.add('hidden');
    renderResumen();
  } else if (tab === 'nuevo') {
    document.getElementById('page-nuevo').classList.remove('hidden');
    fab.classList.add('hidden');
    renderNuevoPedido();
  } else if (tab === 'detalle') {
    document.getElementById('page-detalle').classList.remove('hidden');
    fab.classList.add('hidden');
    renderDetalle(state.currentOrderId);
  }
}

document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => goToTab(tab.dataset.tab)));

document.getElementById('fabNuevo').addEventListener('click', () => {
  state.editingOrderId = null;
  resetNewPairs();
  goToTab('nuevo');
});

// Delegación clicks en tarjetas de inicio
document.getElementById('page-inicio').addEventListener('click', (e) => {
  const deleteBtn = e.target.closest('[data-delete-order]');
  if (deleteBtn) { deleteOrder(deleteBtn.dataset.deleteOrder); return; }
  const openBtn = e.target.closest('[data-open-order]');
  if (openBtn) { state.currentOrderId = openBtn.dataset.openOrder; goToTab('detalle'); return; }
  const card = e.target.closest('.order-card-main');
  if (card) { state.currentOrderId = card.dataset.openOrder; goToTab('detalle'); }
});

// ============ INIT ============

async function refreshData() { await apiGet(); }

async function init() {
  document.getElementById('page-inicio').innerHTML = `<div class="loader-wrap"><div class="spinner"></div></div>`;
  const ok = await apiGet();
  if (!ok) {
    document.getElementById('page-inicio').innerHTML = `<div class="empty-state"><div class="ic">&#9888;</div><p>No se pudo conectar. Revisá tu conexión.</p></div>`;
    return;
  }
  renderInicio();
}

resetNewPairs();
init();
</script>
